    <script>
      $(function () {
        var tar = {},
          sar = {},
          far = {},
          timeout,
          count = 0;
        loadImages(function () {
          $("#transthumb").attr("src", "t198.jpg");
          $("#sagthumb").attr("src", "s224.jpg");
          $("#frontthumb").attr("src", "ff149.jpg");
          $("div#tblock").text(198);
          $("div#sblock").text(224);
          $("div#fblock").text(149);
          $("#tdraggable").css({ left: 224, top: 149 });
          $("#sdraggable").css({ left: 149, top: 198 });
          $("#fdraggable").css({ left: 224, top: 198 });
        });

        function loadImages(callback) {
          var ti = 0,
            tim = 0,
            si = 0,
            sim = 0,
            fi = 0,
            fim = 0,
            t = 561,
            tt = 0,
            s = 461,
            st = 600,
            f = 421,
            ft = 270;
          while (--t) {
            tar[ti] = new Image();
            tar[ti].src = "t" + tim + ".jpg";
            tar[ti].tk = tt;
            tt += 2;
            ti += 2;
            tim++;
          }
          while (--s) {
            sar[si] = new Image();
            sar[si].src = "s" + sim + ".jpg";
            sar[si].tk = st;
            st += 2;
            si += 2;
            sim++;
          }
          while (--f) {
            far[fi] = new Image();
            far[fi].src = "ff" + fim + ".jpg";
            far[fi].tk = ft;
            ft += 2;
            fi += 2;
            fim++;
          }
          callback();
        }
        $("#tdraggable").draggable({
          handle: "#thandle",
          containment: "#tcontainer",
          drag: function (event, ui) {
            var x = parseInt($(this).position().left),
              curx = sar[x] || sar[x - 1],
              y = parseInt($(this).position().top),
              cury = far[y] || far[y - 1];
            $("#fdraggable").css({ left: x });
            $("#sdraggable").css({ left: y });
            $("#sagthumb").attr("src", "s" + x + ".jpg");
            $("div#sblock").text(x);
            $("#frontthumb").attr("src", "ff" + y + ".jpg");
            $("div#fblock").text(y);
          },
        });
        $("#sdraggable").draggable({
          handle: "#shandle",
          containment: "#scontainer",
          drag: function (event, ui) {
            var x = parseInt($(this).position().left),
              curx = far[x] || far[x - 1],
              y = parseInt($(this).position().top),
              cury = tar[y] || tar[y - 1];
            $("#tdraggable").css({ top: x });
            $("#fdraggable").css({ top: y });
            $("#frontthumb").attr("src", "ff" + x + ".jpg");
            $("div#fblock").text(x);
            $("#transthumb").attr("src", "t" + y + ".jpg");
            $("div#tblock").text(y);
          },
        });
        $("#fdraggable").draggable({
          handle: "#fhandle",
          containment: "#fcontainer",
          drag: function (event, ui) {
            var x = parseInt($(this).position().left),
              curx = sar[x] || sar[x - 1],
              y = parseInt($(this).position().top),
              cury = tar[y] || tar[y - 1];
            $("#sdraggable").css({ top: y });
            $("#tdraggable").css({ left: x });
            $("#sagthumb").attr("src", "s" + x + ".jpg");
            $("div#sblock").text(x);
            $("#transthumb").attr("src", "t" + y + ".jpg");
            $("div#tblock").text(y);
          },
        });
        $(".boxlink")
          .css("cursor", "pointer")
          .click(function () {
            var curid = $(this).attr("id");
            var url = curid + "/" + $(this).text() + ".jpg";
            window.open(url);
          });
        $(".ico").css("cursor", "move");
        $(".arrow").on("mouseup mouseout", function () {
          clearInterval(timeout);
          return false;
        });
        $(".arrow")
          .css("cursor", "pointer")
          .mousedown(function (e) {
            tellertje();
            function tellertje() {
              pressedButton = e.target.id;
              switch (pressedButton) {
                case "kr1l":
                case "kr1r":
                case "sbup":
                case "sbdown":
                  var curx = parseInt($("#tdraggable").position().left);
                  if (
                    (pressedButton == "kr1r" || pressedButton == "sbup") &&
                    curx <= 460
                  ) {
                    $("#tdraggable").css("left", "+=1");
                    $("#fdraggable").css("left", "+=1");
                  } else {
                    if (curx > 0) {
                      $("#tdraggable").css("left", "-=1");
                      $("#fdraggable").css("left", "-=1");
                    }
                  }
                  var cps = sar[curx];
                  $("#sagthumb").attr("src", "s" + curx + ".jpg");
                  $("div#sblock").text(curx);
                  break;
                case "kr1up":
                case "kr1down":
                  var cury = parseInt($("#tdraggable").position().top);
                  if (pressedButton == "kr1down" && cury <= 420) {
                    $("#tdraggable").css("top", "+=1");
                    $("#sdraggable").css("left", "+=1");
                  } else {
                    if (cury > 0) {
                      $("#tdraggable").css("top", "-=1");
                      $("#sdraggable").css("left", "-=1");
                    }
                  }
                  var cpf = far[cury];
                  $("#frontthumb").attr("src", "ff" + cury + ".jpg");
                  $("div#fblock").text(cury);
                  break;
                case "kr2l":
                case "kr2r":
                case "fbup":
                case "fbdown":
                  var curx = parseInt($("#sdraggable").position().left);
                  if (
                    (pressedButton == "kr2r" || pressedButton == "fbup") &&
                    curx <= 420
                  ) {
                    $("#sdraggable").css("left", "+=1");
                    $("#tdraggable").css("top", "+=1");
                  } else {
                    if (curx > 0) {
                      $("#sdraggable").css("left", "-=1");
                      $("#tdraggable").css("top", "-=1");
                    }
                  }
                  var cpf = far[curx];
                  $("#frontthumb").attr("src", "ff" + curx + ".jpg");
                  $("div#fblock").text(curx);
                  break;
                case "kr2up":
                case "kr2down":
                  var cury = parseInt($("#sdraggable").position().top);
                  if (pressedButton == "kr2down" && cury <= 560) {
                    $("#sdraggable").css("top", "+=1");
                    $("#fdraggable").css("top", "+=1");
                  } else {
                    if (cury > 0) {
                      $("#sdraggable").css("top", "-=1");
                      $("#fdraggable").css("top", "-=1");
                    }
                  }
                  var cpt = tar[cury];
                  if (cpt) {
                    $("#transthumb").attr("src", "t" + cury + ".jpg");
                    $("div#tblock").text(cury);
                  }
                  break;
                case "kr3l":
                case "kr3r":
                  var curx = parseInt($("#fdraggable").position().left);
                  if (pressedButton == "kr3r" && curx <= 460) {
                    $("#fdraggable").css("left", "+=1");
                    $("#tdraggable").css("left", "+=1");
                  } else {
                    if (curx > 0) {
                      $("#fdraggable").css("left", "-=1");
                      $("#tdraggable").css("left", "-=1");
                    }
                  }
                  var cps = sar[curx];
                  if (cps) {
                    $("#sagthumb").attr("src", "s" + curx + ".jpg");
                    $("div#sblock").text(curx);
                  }
                  break;
                case "kr3up":
                case "kr3down":
                case "tbup":
                case "tbdown":
                  var cury = parseInt($("#fdraggable").position().top);
                  if (
                    (pressedButton == "kr3down" || pressedButton == "tbup") &&
                    cury <= 560
                  ) {
                    $("#sdraggable").css("top", "+=1");
                    $("#fdraggable").css("top", "+=1");
                  } else {
                    if (cury > 0) {
                      $("#sdraggable").css("top", "-=1");
                      $("#fdraggable").css("top", "-=1");
                    }
                  }
                  var cpt = tar[cury];
                  if (cpt) {
                    $("#transthumb").attr("src", "t" + cury + ".jpg");
                    $("div#tblock").text(cury);
                  }
                  break;
              }
            }

            timeout = setInterval(function () {
              tellertje();
            }, 50);
            return false;
          });

        $(window).on("load", function () {
          $("#overlay").remove();
        });
      });
    </script>
