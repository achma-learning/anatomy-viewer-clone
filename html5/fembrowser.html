#overlay{z-index:5;bottom:0;right:0;background:#000;opacity:0.8;filter:alpha(opacity=80);color:#FFF}#overlay,#background,#transthumb,#sagthumb,#frontthumb,#tcontainer,#scontainer,#fcontainer,#kr1,#kr1up,#kr1down,#kr1l,#kr1r,#kr2,#kr2up,#kr2down,#kr2l,#kr2r,#kr3,#kr3up,#kr3down,#kr3l,#kr3r,#tbup,#tbdown,#sbup,#sbdown,#fbup,#fbdown,#tblock,#sblock,#fblock,#copywr,#tlab,#slab,#flab{position:absolute}#overlay,#background{left:0;top:0}#overlay,#tlab,#slab,#flab{font-size:14px}#overlay,#tblock,#sblock,#fblock,#tlab,#slab,#flab{font-weight:bold}body{font-family:Arial,Helvetica,sans-serif}#background{height:836px;width:1064px;border:0;margin:0;padding:0;background:url(../av/lightbluegradsmall.png) #a7cfdf repeat-x;}#transthumb,#tcontainer,#copywr,#tlab{left:3px}#transthumb,#sagthumb,#frontthumb,#tcontainer,#scontainer,#fcontainer{top:3px}#transthumb,#tcontainer{height:308px}#transthumb,#frontthumb,#tcontainer,#fcontainer{width:372px}#transthumb,#sagthumb,#frontthumb{z-index:1}#sagthumb,#scontainer{left:378px;width:308px}#sagthumb,#frontthumb,#scontainer,#fcontainer{height:808px}#frontthumb,#fcontainer,#flab{left:689px}#tcontainer,#scontainer,#fcontainer{overflow:hidden;z-index:2}#tdraggable,#sdraggable,#fdraggable{width:1px;height:1px;background:00ff00}#thandle,#shandle,#fhandle{height:1800px;width:1000px;position:relative;top:-900px;left:-500px}#kr1,#kr2,#kr3{height:77px;width:78px;top:455px;background:url(kruis.png) no-repeat}#kr1,#tblock{left:9px}#kr1up,#kr2up,#kr3up{top:5px}#kr1up,#kr1down,#kr2up,#kr2down,#kr3up,#kr3down{left:29px}#kr1up,#kr2up,#kr3up,#tbup,#sbup,#fbup{background:url(up.gif) no-repeat}#kr1up,#kr1down,#kr2up,#kr2down,#kr3up,#kr3down,#tbup,#tbdown,#sbup,#sbdown,#fbup,#fbdown{width:22px;height:11px}#kr1down,#kr2down,#kr3down{top:61px}#kr1down,#kr2down,#kr3down,#tbdown,#sbdown,#fbdown{background:url(down.gif) no-repeat}#kr1l,#kr1r,#kr2l,#kr2r,#kr3l,#kr3r{top:27px;width:11px;height:22px}#kr1l,#kr2l,#kr3l{left:7px;background:url(left.gif) no-repeat}#kr1r,#kr2r,#kr3r{left:61px;background:url(right.gif) no-repeat}#kr2,#sblock{left:135px}#kr3,#fblock{left:261px}#tbup,#sbup,#fbup{top:358px}#tbup,#tbdown{left:38px}#tbdown,#sbdown,#fbdown{top:420px}#sbup,#sbdown{left:164px}#fbup,#fbdown{left:290px}#tblock,#sblock,#fblock{height:26px;width:81px;top:378px;background:url(boxje.gif) no-repeat;text-align:center;line-height:2em;color:#f00}#copywr{top:819px;font-size:10px;color:#333}#tlab{top:313px}#tlab,#slab,#flab{color:#666}#slab,#flab{top:814px}#slab{left:377px}</style><!--[if gte IE 9]><style type="text/css">.gradient {filter: none;}</style><![endif]--><script>
$(function(){
	var tar = {}, sar = {}, far = {}, timeout, count = 0;
	loadImages(function(){
              	$("#transthumb").attr("src", tar[284].src);
				$("#sagthumb").attr("src", sar[92].src);
				$("#frontthumb").attr("src", far[144].src);
				$("div#tblock").text(1535);
				$("div#sblock").text(821);
				$("div#fblock").text(700);
				$("#tdraggable").css({left: 92, top: 144});
				$("#sdraggable").css({left: 144, top: 284});
				$("#fdraggable").css({left: 92, top: 284});
				});
	 	 	   
     function loadImages(callback){
                var ti = 0, tim = 0, si = 0, sim = 0, fi = 0, fim = 0, t = 405, tt = 825, s = 187, st = 591, f = 155, ft = 340;
				while (--t) {tar[ti]= new Image();tar[ti].src="t"+tim+".jpg";tar[ti].tk=tt;tt+=5;ti+=2;tim++} 
				while (--s) {sar[si]= new Image();sar[si].src="s"+sim+".jpg";sar[si].tk=st;st+=5;si+=2;sim++}
				while (--f) {far[fi]= new Image();far[fi].src="ff"+fim+".jpg";far[fi].tk=ft;ft+=5;fi+=2;fim++} 
				callback();
				};
$("#tdraggable").draggable({handle:"#thandle", containment: "#tcontainer",
	drag: function(event, ui) {
     	var x = parseInt($(this).position().left), curx = sar[x]||sar[x-1],y = parseInt($(this).position().top),cury = far[y]||far[y-1];
		$("#fdraggable").css({left: x});$("#sdraggable").css({left: y});$("#sagthumb").attr("src", curx.src);$("div#sblock").text(curx.tk);$("#frontthumb").attr("src", cury.src);$("div#fblock").text(cury.tk);}
});
$("#sdraggable").draggable({handle:"#shandle", containment: "#scontainer",
    drag: function(event, ui) {
        var x = parseInt($(this).position().left), curx = far[x]||far[x-1],y = parseInt($(this).position().top), cury=tar[y]||tar[y-1];
		$("#tdraggable").css({top: x});	$("#fdraggable").css({top: y});	$("#frontthumb").attr("src", curx.src);$("div#fblock").text(curx.tk);$("#transthumb").attr("src", cury.src);$("div#tblock").text(cury.tk);}
});
$("#fdraggable").draggable({handle:"#fhandle", containment: "#fcontainer",
     drag: function(event, ui) {
       var x = parseInt($(this).position().left), curx = sar[x]||sar[x-1], y = parseInt($(this).position().top), cury=tar[y]||tar[y-1];
		$("#sdraggable").css({top: y});	$("#tdraggable").css({left: x});$("#sagthumb").attr("src", curx.src);$("div#sblock").text(curx.tk);	$("#transthumb").attr("src", cury.src);$("div#tblock").text(cury.tk);}
});
$('.boxlink').css( 'cursor', 'pointer' ).click(function(){var curid = $(this).attr('id');var url = curid +"/"+ $(this).text()+".jpg";window.open(url);}); 
$('.ico').css( 'cursor', 'move' );
$('.arrow').on( "mouseup mouseout", function () {clearInterval(timeout);return false;}); 
$('.arrow').css( 'cursor', 'pointer' ).mousedown(function(e) {
tellertje();      
function tellertje(){
pressedButton = e.target.id;
    switch(pressedButton) 
    {   case "kr1l": 
		case "kr1r":
		case "sbup":
		case "sbdown":
        var curx = parseInt($("#tdraggable").position().left);
		if ((pressedButton == "kr1r" || pressedButton == "sbup") && curx <= 371){$("#tdraggable").css("left", "+=1");$("#fdraggable").css("left", "+=1");}	
		else{if(curx > 0){$("#tdraggable").css("left", "-=1");$("#fdraggable").css("left", "-=1");}}
		var cps = sar[curx];if (cps){$("#sagthumb").attr("src", cps.src);$("div#sblock").text(cps.tk);}
		break; 
     	case "kr1up": 
        case "kr1down":
		var cury = parseInt($("#tdraggable").position().top);
		if (pressedButton == "kr1down" && cury <= 307){$("#tdraggable").css("top", "+=1");$("#sdraggable").css("left", "+=1");}	
		else{if(cury > 0){$("#tdraggable").css("top", "-=1");$("#sdraggable").css("left", "-=1");}}
		var	cpf=far[cury];if (cpf){$("#frontthumb").attr("src", cpf.src);$("div#fblock").text(cpf.tk);}
		break;
		case "kr2l": 
		case "kr2r":
		case "fbup":
		case "fbdown":
       	var curx = parseInt($("#sdraggable").position().left); 
		if ((pressedButton == "kr2r" || pressedButton == "fbup") && curx <= 307){$("#sdraggable").css("left", "+=1");$("#tdraggable").css("top", "+=1");}
		else{if(curx > 0){$("#sdraggable").css("left", "-=1");$("#tdraggable").css("top", "-=1");}}
		var cpf = far[curx];if (cpf){$("#frontthumb").attr("src", cpf.src);$("div#fblock").text(cpf.tk);}
		break;		
		case "kr2up": 
        case "kr2down":
		var cury = parseInt($("#sdraggable").position().top);
		if (pressedButton == "kr2down" && cury <= 807){$("#sdraggable").css("top", "+=1");$("#fdraggable").css("top", "+=1");}
		else{if(cury > 0){$("#sdraggable").css("top", "-=1");$("#fdraggable").css("top", "-=1");}}
		var	cpt=tar[cury];if (cpt){$("#transthumb").attr("src", cpt.src);$("div#tblock").text(cpt.tk);}
		break;
		case "kr3l": 
		case "kr3r":
		var curx = parseInt($("#fdraggable").position().left);
		if (pressedButton == "kr3r" && curx <= 371){$("#fdraggable").css("left", "+=1");$("#tdraggable").css("left", "+=1");}
		else{if(curx > 0){$("#fdraggable").css("left", "-=1");$("#tdraggable").css("left", "-=1");}}
		var cps = sar[curx];if (cps){$("#sagthumb").attr("src", cps.src);$("div#sblock").text(cps.tk);}
		break; 
		case "kr3up": 
        case "kr3down":
		case "tbup":
		case "tbdown":
		var cury = parseInt($("#fdraggable").position().top);
		if ((pressedButton == "kr3down" || pressedButton == "tbup") && cury <= 807){$("#sdraggable").css("top", "+=1");$("#fdraggable").css("top", "+=1");}
		else{if(cury > 0){$("#sdraggable").css("top", "-=1");$("#fdraggable").css("top", "-=1");}}
		var	cpt=tar[cury];if (cpt){$("#transthumb").attr("src", cpt.src);$("div#tblock").text(cpt.tk);}
		break;	
}}
	  
timeout = setInterval(function () {
    tellertje();
    }, 50);
  	return false;
});

$(window).on('load', function () {
      $('#overlay').remove(); 
 });

});

</script>

<script>
(function(){
  var nW=1064, nH=836, fH=34;
  function fit(){
    var bg=document.getElementById('background');
    if(!bg)return;
    var s=Math.min(window.innerWidth/nW,(window.innerHeight-fH)/nH);
    var ox=Math.max(0,(window.innerWidth-nW*s)/2);
    bg.style.transform='translate('+ox+'px,0) scale('+s+')';
  }
  window.addEventListener('resize',fit);
  document.addEventListener('DOMContentLoaded',fit);
  window.addEventListener('load',fit);
})();
</script>
